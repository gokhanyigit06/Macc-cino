upstream macccino_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # The Node/Express app (server.js) handles static files, clean URLs,
    # the /de & /en server-side i18n rendering, the /api endpoints, and the
    # /admin panel — so nginx reverse-proxies everything to it. (A purely
    # static config would break /de, /en and /api.)
    client_max_body_size 55M;   # allow hero video uploads (admin)

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Long cache for static assets (still proxied so there is a single origin).
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mp4|webm)$ {
        proxy_pass http://macccino_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://macccino_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
